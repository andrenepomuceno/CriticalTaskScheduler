; PlatformIO project configuration for TaskScheduler library development.
;
; - [env:native]      runs Unity unit tests on the host (no MCU required).
; - [env:esp32]       compiles the ESP32 examples to validate FreeRTOS path.
; - [env:uno]         compiles the AVR examples to validate the portable core.
;
; Library users do NOT need this file; it is only used to develop and CI-test
; the library itself.

[platformio]
src_dir = src
test_dir = test

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    +<TaskScheduler.cpp>
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DUNIT_TEST
    -DARDUINO=100
    -I src
    -I test/native_support
    -I test/native_support/freertos

[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
build_flags = -Wall

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_flags = -Wall
