name=CriticalTaskScheduler
version=1.0.2
author=Andre Nepomuceno
maintainer=Andre Nepomuceno <andre.nepomuceno@users.noreply.github.com>
sentence=Lightweight cooperative task scheduler with critical/background tasks for Arduino, ESP32, RP2040, and nRF52.
paragraph=Header/.cpp library that schedules periodic callbacks without delay(). Background tasks share the loop() (one earliest-due task per call to avoid starvation) while critical tasks can optionally run on a dedicated FreeRTOS thread (auto-detected on ESP32, RP2040/arduino-pico, and nRF52/Adafruit; STM32 and Teensy 4.x require manual opt-in with -D CRITICALTASKSCHEDULER_HAS_FREERTOS=1 plus a FreeRTOS library). Portable core (no String, no std::vector, no std::function), pluggable time source for tests, per-task stats, MIT licensed.
category=Timing
url=https://github.com/andrenepomuceno/CriticalTaskScheduler
architectures=*
includes=CriticalTaskScheduler.h
