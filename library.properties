name=CriticalTaskScheduler
version=1.0.0
author=Andre Nepomuceno
maintainer=Andre Nepomuceno <andre.nepomuceno@users.noreply.github.com>
sentence=Lightweight cooperative task scheduler with critical/background tasks for Arduino and ESP32.
paragraph=Header/.cpp library that schedules periodic callbacks without delay(). Background tasks share the loop() (one earliest-due task per call to avoid starvation) while critical tasks can optionally run on a dedicated FreeRTOS thread on ESP32. Portable core (no String, no std::vector, no std::function), pluggable time source for tests, per-task stats, MIT licensed.
category=Timing
url=https://github.com/andrenepomuceno/CriticalTaskScheduler
architectures=*
